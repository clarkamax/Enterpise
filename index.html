<div id="root"></div>

<script type="text/babel" src="components/atoms.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
function useHashRoute() {
  const [hash, setHash] = React.useState(window.location.hash || "#/");
  React.useEffect(() => {
    const h = () => setHash(window.location.hash || "#/");
    window.addEventListener("hashchange", h);
    return () => window.removeEventListener("hashchange", h);
  }, []);
  const clean = hash.replace(/^#\/?/, "").split("?")[0];
  const parts = clean.split("/").filter(Boolean);
  return [parts[0] || "home", parts[1] || null];
}
window.useHashRoute = useHashRoute;

function App() {
  const [route, sub] = window.useHashRoute();
  const [lbIdx, setLbIdx] = React.useState(null);
  React.useEffect(() => { window.scrollTo(0, 0); }, [route, sub]);
  const open = (i) => setLbIdx(i);
  const close = () => setLbIdx(null);
  const prev = () => setLbIdx((i) => (i - 1 + GALLERY.length) % GALLERY.length);
  const next = () => setLbIdx((i) => (i + 1) % GALLERY.length);

  let content;
  if (route === "about") content = <window.AboutPage />;
  else if (route === "services") content = sub ? <window.ServiceDetailPage id={sub} /> : <window.ServicesIndexPage />;
  else if (route === "gallery") content = <window.GalleryPage openLightbox={open} />;
  else if (route === "contact") content = <window.ContactPage />;
  else content = <window.HomePage openLightbox={open} />;

  return (
    <>
      <window.Nav route={route} />
      <main>{content}</main>
      <window.Footer />
      {lbIdx !== null && (
        <window.Lightbox
          photo={GALLERY[lbIdx]}
          idx={lbIdx}
          total={GALLERY.length}
          onClose={close}
          onPrev={prev}
          onNext={next}
        />
      )}
    </>
  );
}

const __mount = () => {
  if (!window.HomePage || !window.Nav || !window.Footer || !window.AboutPage) {
    return setTimeout(__mount, 50);
  }
  const el = document.getElementById("root");
  if (!el.__root) el.__root = ReactDOM.createRoot(el);
  el.__root.render(<App />);

  // Reveal on scroll
  setTimeout(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); }
      });
    }, { rootMargin: "0px 0px -10% 0px", threshold: 0.08 });
    document.querySelectorAll("main section, .sec-head, .gallery-tile, .service-card, .fb-card, .stat").forEach((n) => {
      n.classList.add("reveal");
      io.observe(n);
    });
  }, 300);

  // Subtle parallax on hero image
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (!reduce) {
    let raf = 0;
    const tick = () => {
      const el = document.querySelector(".hero-parallax");
      if (el) {
        const y = window.scrollY;
        el.style.transform = `translate3d(0, ${Math.min(y * 0.18, 120)}px, 0)`;
      }
      raf = 0;
    };
    window.addEventListener("scroll", () => {
      if (!raf) raf = requestAnimationFrame(tick);
    }, { passive: true });
  }
};
__mount();
</script>
